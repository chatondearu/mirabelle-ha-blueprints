blueprint:
  homeassistant:
    min_version: 2025.5.3
  name: "[CDA] 🔢 Keypad Frient (KEPZB-110) for Alarmo (FR/EN)"
  description: >
    Bridge a Frient KEPZB-110 Zigbee keypad (via ZHA) with an Alarmo central
    (or any other alarm_control_panel) used as the single source of truth.

    PIN codes and RFID badges are validated by the mirrored panel (Alarmo):
    the keypad only forwards the typed code, so manage your codes in Alarmo.

    Optional, experimental keypad feedback can push the panel status back to the
    keypad LEDs/buzzer via raw IAS ACE cluster commands. This is best-effort
    because ZHA does not fully implement the IAS ACE "central" role yet
    (see https://github.com/zigpy/zha-device-handlers/issues/4365).

    Original blueprint by Darktoinon (Home Assistant community forum), adapted
    and maintained here.
  domain: automation
  input:
    devices:
      name: Devices / Appareils
      icon: mdi:dialpad
      input:
        keypad:
          name: Frient Keypad
          description: >
            The Frient KEPZB-110 keypad (ZHA device).
            Le clavier Frient KEPZB-110 (appareil ZHA).
          selector:
            device:
              integration: zha
        alarm_panel:
          name: Frient Alarm Panel
          description: >
            The Frient alarm panel to control (the ZHA alarm_control_panel
            entity backed by the keypad).
            Le panneau d'alarme Frient à contrôler.
          selector:
            entity:
              domain: alarm_control_panel
        mirror_alarm_panel:
          name: Alarm Panel to Mirror (Alarmo or other)
          description: >
            The alarm panel used as the source of truth (e.g. Alarmo).
            Le panneau d'alarme servant de source de vérité (ex: Alarmo).
          default: alarm_control_panel.alarmo
          selector:
            entity:
              domain: alarm_control_panel
    codes:
      name: Codes / Codes
      icon: mdi:form-textbox-password
      input:
        default_pin:
          name: Frient Panel Disarm Code / Code de désarmement du panneau Frient
          description: >
            Code sent to the Frient alarm panel when (dis)arming it from Alarmo.
            Leave empty if your Frient panel does not require a code.
            Code envoyé au panneau Frient lors de l'armement/désarmement.
          default: ""
          selector:
            text:
              type: password
        mirror_default_pin:
          name: Default Code for Mirrored Alarm / Code par défaut pour la centrale
          description: >
            Fallback code used on the mirrored panel (Alarmo) when the keypad
            event does not carry a code.
            Code par défaut utilisé sur la centrale (Alarmo) si l'événement du
            clavier ne transmet pas de code.
          default: ""
          selector:
            text:
              type: password
    feedback:
      name: Keypad Feedback (experimental) / Retour clavier (expérimental)
      icon: mdi:led-on
      input:
        enable_keypad_feedback:
          name: Enable Keypad LED/Buzzer Feedback
          description: >
            Push the alarm status back to the keypad via raw IAS ACE commands.
            Experimental and best-effort due to ZHA limitations; disabled by
            default. Never blocks arming/disarming if it fails.
            Renvoie l'état de l'alarme au clavier via des commandes IAS ACE
            brutes. Expérimental, désactivé par défaut.
          default: false
          selector:
            boolean:
        keypad_endpoint:
          name: Keypad IAS ACE Endpoint
          description: >
            Zigbee endpoint of the IAS ACE cluster on the keypad. Usually 1.
            Find it in Settings > Devices > your keypad > ZHA device info
            (Manage Zigbee device > Clusters).
            Endpoint Zigbee du cluster IAS ACE du clavier (généralement 1).
          default: 1
          selector:
            number:
              min: 1
              max: 255
              mode: box

# Alarmo is the source of truth. The keypad arms/disarms Alarmo; Alarmo state
# changes are then mirrored onto the Frient panel (and optionally the keypad
# LEDs). There is no trigger on the Frient panel itself, so no feedback loop.
trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input keypad
      command: arm
    id: keypad_event

  - platform: state
    entity_id: !input mirror_alarm_panel
    id: mirror_state_change

variables:
  mirror_default_pin: !input mirror_default_pin
  enable_keypad_feedback: !input enable_keypad_feedback
  keypad_endpoint: !input keypad_endpoint
  keypad_device: !input keypad
  alarm_panel_entity: !input alarm_panel
  # ZHA stores the IEEE address as the device identifier ("zha", "xx:xx:..").
  keypad_ieee: >-
    {% set ids = device_attr(keypad_device, 'identifiers') | list %}
    {{ ids[0][1] if ids and ids[0] | count > 1 else '' }}

mode: single

action:
  - choose:
      # --- Keypad -> Alarmo ----------------------------------------------------
      - conditions:
          - condition: trigger
            id: keypad_event
        sequence:
          # Code typed on the keypad, falling back to the configured default.
          - variables:
              keypad_arm_mode: "{{ trigger.event.data.args.arm_mode | default(-1) | int(-1) }}"
              keypad_code: >-
                {% set c = trigger.event.data.args.code | default('') %}
                {{ c if c != '' else mirror_default_pin }}
          - choose:
              # arm_mode 0 = disarm
              - conditions:
                  - condition: template
                    value_template: "{{ keypad_arm_mode == 0 }}"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input mirror_alarm_panel
                    data:
                      code: "{{ keypad_code }}"
              # arm_mode 1 = arm home
              - conditions:
                  - condition: template
                    value_template: "{{ keypad_arm_mode == 1 }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input mirror_alarm_panel
                    data:
                      code: "{{ keypad_code }}"
              # arm_mode 2 = arm night
              - conditions:
                  - condition: template
                    value_template: "{{ keypad_arm_mode == 2 }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input mirror_alarm_panel
                    data:
                      code: "{{ keypad_code }}"
              # arm_mode 3 = arm away
              - conditions:
                  - condition: template
                    value_template: "{{ keypad_arm_mode == 3 }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input mirror_alarm_panel
                    data:
                      code: "{{ keypad_code }}"

      # --- Alarmo -> Frient panel (+ optional keypad feedback) -----------------
      - conditions:
          - condition: trigger
            id: mirror_state_change
        sequence:
          - variables:
              mirror_state: "{{ trigger.to_state.state }}"
          # Only act when the Frient panel is not already in the target state,
          # which avoids redundant service calls and keypad re-arm beeps.
          - choose:
              - conditions:
                  - "{{ mirror_state == 'disarmed' and states(alarm_panel_entity) != 'disarmed' }}"
                sequence:
                  - service: alarm_control_panel.alarm_disarm
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin
              - conditions:
                  - "{{ mirror_state == 'armed_home' and states(alarm_panel_entity) != 'armed_home' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_home
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin
              - conditions:
                  - "{{ mirror_state == 'armed_night' and states(alarm_panel_entity) != 'armed_night' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_night
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin
              - conditions:
                  - "{{ mirror_state == 'armed_away' and states(alarm_panel_entity) != 'armed_away' }}"
                sequence:
                  - service: alarm_control_panel.alarm_arm_away
                    target:
                      entity_id: !input alarm_panel
                    data:
                      code: !input default_pin
              - conditions:
                  - "{{ mirror_state == 'triggered' and states(alarm_panel_entity) != 'triggered' }}"
                sequence:
                  - service: alarm_control_panel.alarm_trigger
                    target:
                      entity_id: !input alarm_panel

          # Best-effort keypad LED/buzzer feedback via raw IAS ACE
          # panel_status_changed (cluster 0x0501 = 1281, command 0x04).
          # args = [panel_status, seconds_remaining, audible_notification,
          # alarm_status]. continue_on_error keeps the alarm working if ZHA
          # rejects the command.
          - if:
              - "{{ enable_keypad_feedback and keypad_ieee != '' }}"
            then:
              - service: zha.issue_zigbee_cluster_command
                continue_on_error: true
                data:
                  ieee: "{{ keypad_ieee }}"
                  endpoint_id: !input keypad_endpoint
                  cluster_id: 1281
                  cluster_type: out
                  command: 4
                  command_type: client
                  args:
                    - >-
                      {{ {'disarmed': 0, 'armed_home': 1, 'armed_night': 2,
                          'armed_away': 3, 'arming': 4, 'pending': 5,
                          'triggered': 7}.get(mirror_state, 6) }}
                    - 0
                    - "{{ 1 if mirror_state in ['arming', 'pending', 'triggered'] else 0 }}"
                    - 0
