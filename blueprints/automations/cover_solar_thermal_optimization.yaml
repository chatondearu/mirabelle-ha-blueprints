blueprint:
  homeassistant:
    min_version: 2025.5.3
  name: "[CDA] 🌞 Smart Cover Solar & Thermal Optimization"
  description: >
    Automatically open or close covers based on sun, outdoor temperature, and wind,
    with seasonal behavior (summer/winter) to help optimize indoor temperature.
    Actions run only when someone is home and awake.
    Awake can be driven by an entity, a schedule, or fallback to daylight.
    Uses key positions (0/25/50/75/100) instead of only full open/close.
    Version 2: stateless logic (no external helpers), per-cover contact sensor links,
    and a single decision ladder applied through one loop.
  domain: automation
  input:
    covers_section:
      name: Covers & Orientation
      icon: mdi:window-shutter
      collapsed: false
      input:
        covers:
          name: All Managed Covers
          description: All covers that can be controlled by this automation.
          selector:
            entity:
              filter:
                - domain: cover
              multiple: true
        north_covers:
          name: North-Facing Covers
          description: >
            Optional. Covers on the north facade. Leave empty if not used.
          default: []
          selector:
            entity:
              filter:
                - domain: cover
              multiple: true
        east_covers:
          name: East-Facing Covers
          description: >
            Optional. Covers on the east facade. Leave empty if not used.
          default: []
          selector:
            entity:
              filter:
                - domain: cover
              multiple: true
        south_covers:
          name: South-Facing Covers
          description: >
            Optional. Covers on the south facade. Leave empty if not used.
          default: []
          selector:
            entity:
              filter:
                - domain: cover
              multiple: true
        west_covers:
          name: West-Facing Covers
          description: >
            Optional. Covers on the west facade. Leave empty if not used.
          default: []
          selector:
            entity:
              filter:
                - domain: cover
              multiple: true
        south_facade_azimuth:
          name: South Facade Azimuth
          description: >
            Compass bearing of your south-facing facade, on the same 0-360 scale as
            the Home Assistant sun azimuth and the Forecast.Solar integration
            (0 = North, 90 = East, 180 = South, 270 = West). Set this to your real
            orientation when the house is not aligned to true north/south; the
            other facades are derived automatically at 90 degree steps. The default
            180 keeps the legacy plain north/south/east/west behavior.
          default: 180
          selector:
            number:
              min: 0
              max: 360
              step: 1
              unit_of_measurement: "°"
        facade_exposure_half_angle:
          name: Facade Exposure Half-Angle
          description: >
            How far (in degrees) the sun may be from a facade's outward normal while
            still counting as lighting that facade. 90 lights a facade across its full
            geometric range; lower values (for example 70-80) stop shading earlier at
            grazing angles, which suits a house that only has north and south facades.
          default: 75
          selector:
            number:
              min: 30
              max: 90
              step: 1
              unit_of_measurement: "°"
    presence_section:
      name: Presence & Awake
      icon: mdi:account-check
      collapsed: false
      input:
        presence_persons:
          name: Persons At Home
          description: >
            Select one or more person entities.
            The automation runs when at least one selected person is home.
          default: []
          selector:
            entity:
              filter:
                - domain: person
              multiple: true
        close_when_away:
          name: Close Covers When Away
          description: >
            If enabled, all managed covers are closed when nobody is home.
          default: true
          selector:
            boolean: {}
        awake_entity:
          name: Awake Entity (Optional)
          description: >
            Optional entity that indicates someone is awake
            (typically input_boolean or binary_sensor).
            If empty and no schedule is set, daylight is used as awake fallback.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_boolean
                - domain: binary_sensor
        awake_schedule:
          name: Awake Schedule (Optional)
          description: >
            Optional schedule helper to define awake hours.
            Used only when Awake Entity is not set.
            If both are empty, daylight is used as awake fallback.
          default: ""
          selector:
            entity:
              filter:
                - domain: schedule
    contact_section:
      name: Contact Sensors (Per Cover)
      icon: mdi:door-open
      collapsed: true
      input:
        cover_contact_links:
          name: Cover ↔ Contact Sensor Links
          description: >
            Optional. Link each cover to one or more contact sensors (door/window).
            When any linked sensor is open, that specific cover moves to the
            Contact Open Position. Each entry targets a single cover and its own sensors,
            so different covers can have a different number of sensors.
            Provide a list of entries, each with a "cover" entity id and a "sensors" list,
            for example:
              - cover: cover.bay_window
                sensors:
                  - binary_sensor.bay_window_top
                  - binary_sensor.bay_window_bottom
          default: []
          selector:
            object: {}
        contact_open_position:
          name: Contact Open Position
          description: Position used for a cover when one of its linked sensors is open.
          default: "100"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
    night_section:
      name: Night & Wind Safety
      icon: mdi:weather-night
      collapsed: true
      input:
        night_position:
          name: Night Position
          description: >
            Position used at night (sun below horizon). Default 0 closes covers.
            Set a higher value to keep covers partly open at night.
          default: "0"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
        wind_speed:
          name: Wind Speed Sensor (Optional)
          description: >
            Optional wind speed sensor (same unit as threshold below).
            If empty, wind protection is disabled.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
        max_wind_speed:
          name: Max Wind Speed
          description: Covers move to the high-wind position when wind is above this threshold.
          default: 35
          selector:
            number:
              min: 0
              max: 150
              step: 1
        wind_position:
          name: Position With High Wind
          description: Cover position when wind is above threshold.
          default: "0"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
    temperature_section:
      name: Temperature Sources
      icon: mdi:thermometer
      collapsed: true
      input:
        outdoor_temperature:
          name: Outdoor Temperature Sensor (Optional)
          description: >
            Optional outdoor temperature sensor in °C.
            If empty, weather forecast/current weather temperature can be used.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
        weather_entity:
          name: Weather Entity (Optional Fallback)
          description: >
            Optional weather entity used when Outdoor Temperature Sensor is empty.
            The blueprint first tries forecast temperature, then weather temperature attribute.
          default: ""
          selector:
            entity:
              filter:
                - domain: weather
        indoor_temperature:
          name: Indoor Temperature Sensor (Optional)
          description: Optional indoor temperature sensor in °C.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: temperature
    season_section:
      name: Season
      icon: mdi:sun-snowflake
      collapsed: true
      input:
        season_mode:
          name: Season Mode
          description: >
            Select Auto to infer season from configurable summer dates,
            or force Summer/Winter mode.
          default: auto
          selector:
            select:
              options:
                - label: Auto
                  value: auto
                - label: Summer
                  value: summer
                - label: Winter
                  value: winter
        summer_start_month:
          name: Summer Start Month (Auto Mode)
          description: Month when summer starts in auto mode.
          default: 4
          selector:
            number:
              min: 1
              max: 12
              step: 1
        summer_start_day:
          name: Summer Start Day (Auto Mode)
          description: Day when summer starts in auto mode.
          default: 1
          selector:
            number:
              min: 1
              max: 31
              step: 1
        summer_end_month:
          name: Summer End Month (Auto Mode)
          description: Month when summer ends in auto mode.
          default: 9
          selector:
            number:
              min: 1
              max: 12
              step: 1
        summer_end_day:
          name: Summer End Day (Auto Mode)
          description: Day when summer ends in auto mode.
          default: 30
          selector:
            number:
              min: 1
              max: 31
              step: 1
    thresholds_section:
      name: Thermal Thresholds
      icon: mdi:thermostat
      collapsed: true
      input:
        summer_close_temp:
          name: Summer Close Temperature
          description: Shade covers in summer daylight when temperature is above this value.
          default: 24
          selector:
            number:
              min: 10
              max: 40
              step: 0.5
              unit_of_measurement: °C
        indoor_hot_temp:
          name: Indoor Hot Temperature
          description: In summer/daylight, shading is activated above this indoor temperature.
          default: 24
          selector:
            number:
              min: 15
              max: 35
              step: 0.5
              unit_of_measurement: °C
        winter_open_temp_below:
          name: Winter Open Temperature Below
          description: Favor winter solar gains when outdoor temperature is below this value.
          default: 17
          selector:
            number:
              min: -10
              max: 25
              step: 0.5
              unit_of_measurement: °C
        winter_indoor_cold_temp:
          name: Winter Indoor Cold Temperature
          description: In winter/daylight, allow solar gains when indoor temp is below this value.
          default: 19
          selector:
            number:
              min: 10
              max: 25
              step: 0.5
              unit_of_measurement: °C
        temperature_hysteresis:
          name: Temperature Hysteresis Buffer
          description: >
            Buffer in °C applied around temperature thresholds to reduce oscillations.
          default: 0.5
          selector:
            number:
              min: 0
              max: 5
              step: 0.1
              unit_of_measurement: °C
        sensor_stability_minutes:
          name: Sensor Stability Window (Minutes)
          description: >
            Minimum time (in minutes) a sensor value must stay unchanged before being used.
            Helps prevent rapid reactions to noisy sensor updates.
          default: 5
          selector:
            select:
              options:
                - label: "0 (disabled)"
                  value: "0"
                - label: "5"
                  value: "5"
                - label: "10"
                  value: "10"
                - label: "15"
                  value: "15"
    positions_section:
      name: Comfort Positions
      icon: mdi:arrow-up-down
      collapsed: true
      input:
        summer_sun_facing_position:
          name: Summer Position (Sun-Facing Facade)
          description: >
            Shading position applied only to the facade currently exposed to the sun
            during summer heat. Other facades stay at the Neutral (open) position.
          default: "25"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
        winter_day_gain_position:
          name: Winter Day Position (Solar Gains)
          description: >
            Open position applied only to the sun-facing facade in winter daylight
            when heat gains are needed.
          default: "100"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
        winter_day_hold_position:
          name: Winter Day Position (Insulating / No Gains)
          description: >
            Insulating position used in winter daylight for facades not under the sun,
            and for all facades when no solar gains are needed.
          default: "50"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
        neutral_position:
          name: Neutral Position
          description: >
            Open position used in summer daylight for facades not under the sun,
            and for all facades once it is cool enough.
          default: "100"
          selector:
            select:
              options:
                - "0"
                - "25"
                - "50"
                - "75"
                - "100"
    motion_section:
      name: Motion & Manual Override
      icon: mdi:gesture-tap
      collapsed: true
      input:
        manual_override_minutes:
          name: Manual Override Hold (Minutes)
          description: >
            If a cover is manually changed (external action), keep that cover out of
            comfort actions for this duration before automation takes control again.
            Safety branches (away/night/wind) and contact opening can still override.
          default: 60
          selector:
            number:
              min: 0
              max: 240
              step: 5
              unit_of_measurement: min
        minimum_reposition_delta:
          name: Minimum Position Delta
          description: >
            Minimum position difference (in %) required before a comfort move is sent.
            Safety branches (away/night/wind) and contact opening ignore this value.
          default: 10
          selector:
            number:
              min: 0
              max: 100
              step: 1
              unit_of_measurement: "%"
        minimum_action_interval_minutes:
          name: Minimum Action Interval (Minutes)
          description: >
            Minimum delay between two comfort actions for the same cover.
            Safety branches (away/night/wind) and contact opening ignore this value.
          default: 5
          selector:
            number:
              min: 0
              max: 120
              step: 5
              unit_of_measurement: min

  source_url: https://github.com/chatondearu/mirabelle-ha-blueprints/blob/main/blueprints/automations/cover_solar_thermal_optimization.yaml

mode: single

trigger_variables:
  awake_entity_input: !input awake_entity
  awake_schedule_input: !input awake_schedule
  cover_contact_links_input: !input cover_contact_links

trigger:
  # Real state triggers fire on any change. An empty entity list is tolerated
  # by Home Assistant (it simply tracks nothing).
  - platform: state
    entity_id: !input covers
  - platform: state
    entity_id: !input presence_persons
  - platform: state
    entity_id: sun.sun
  # Awake source (entity, schedule, or daylight fallback). A template trigger
  # fires when the rendered value transitions to true, so this is kept boolean.
  - platform: template
    value_template: >
      {% if awake_entity_input | length > 0 %}
        {{ states(awake_entity_input) in ['on', 'home'] }}
      {% elif awake_schedule_input | length > 0 %}
        {{ is_state(awake_schedule_input, 'on') }}
      {% else %}
        {{ is_state('sun.sun', 'above_horizon') }}
      {% endif %}
  # Contact opening edge: fires when at least one linked sensor becomes open.
  - platform: template
    value_template: >
      {% set ns = namespace(open=false) %}
      {% for link in cover_contact_links_input %}
        {% set sensors = link.sensors if (link.sensors is defined and link.sensors is not none) else [] %}
        {% if expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 %}
          {% set ns.open = true %}
        {% endif %}
      {% endfor %}
      {{ ns.open }}
  # Contact clearing edge: fires when all linked sensors are closed again,
  # so the affected cover can return to its comfort position.
  - platform: template
    value_template: >
      {% set ns = namespace(open=false) %}
      {% for link in cover_contact_links_input %}
        {% set sensors = link.sensors if (link.sensors is defined and link.sensors is not none) else [] %}
        {% if expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 %}
          {% set ns.open = true %}
        {% endif %}
      {% endfor %}
      {{ not ns.open }}
  # Catch-all for slow signals (temperature, wind, weather, awake entity).
  - platform: time_pattern
    minutes: "/10"

variables:
  # --- Raw inputs ---
  cover_entities: !input covers
  north_cover_entities: !input north_covers
  east_cover_entities: !input east_covers
  south_cover_entities: !input south_covers
  west_cover_entities: !input west_covers
  south_facade_azimuth_input: !input south_facade_azimuth
  facade_exposure_half_angle_input: !input facade_exposure_half_angle
  presence_person_entities: !input presence_persons
  close_when_away: !input close_when_away
  awake_entity_input: !input awake_entity
  awake_schedule_input: !input awake_schedule
  cover_contact_links: !input cover_contact_links
  outdoor_temperature_entity: !input outdoor_temperature
  weather_entity: !input weather_entity
  indoor_temperature_entity: !input indoor_temperature
  wind_speed_entity: !input wind_speed
  season_mode: !input season_mode
  summer_start_month: !input summer_start_month
  summer_start_day: !input summer_start_day
  summer_end_month: !input summer_end_month
  summer_end_day: !input summer_end_day
  summer_close_temp: !input summer_close_temp
  indoor_hot_temp: !input indoor_hot_temp
  winter_open_temp_below: !input winter_open_temp_below
  winter_indoor_cold_temp: !input winter_indoor_cold_temp
  temperature_hysteresis: !input temperature_hysteresis
  max_wind_speed: !input max_wind_speed
  manual_override_minutes_input: !input manual_override_minutes
  minimum_reposition_delta_input: !input minimum_reposition_delta
  minimum_action_interval_minutes_input: !input minimum_action_interval_minutes
  sensor_stability_minutes_input: !input sensor_stability_minutes
  contact_open_position_input: !input contact_open_position
  night_position_input: !input night_position
  wind_position_input: !input wind_position
  summer_sun_facing_position_input: !input summer_sun_facing_position
  winter_day_gain_position_input: !input winter_day_gain_position
  winter_day_hold_position_input: !input winter_day_hold_position
  neutral_position_input: !input neutral_position

  # --- Normalized numeric values ---
  contact_open_position: "{{ contact_open_position_input | int(100) }}"
  night_position: "{{ night_position_input | int(0) }}"
  wind_position: "{{ wind_position_input | int(0) }}"
  summer_sun_facing_position: "{{ summer_sun_facing_position_input | int(25) }}"
  winter_day_gain_position: "{{ winter_day_gain_position_input | int(100) }}"
  winter_day_hold_position: "{{ winter_day_hold_position_input | int(50) }}"
  neutral_position: "{{ neutral_position_input | int(100) }}"
  south_facade_azimuth: "{{ south_facade_azimuth_input | float(180) }}"
  facade_exposure_half_angle: "{{ facade_exposure_half_angle_input | float(75) }}"
  sensor_stability_minutes: "{{ sensor_stability_minutes_input | int(5) }}"
  manual_override_minutes: "{{ manual_override_minutes_input | int(60) }}"
  minimum_reposition_delta: "{{ minimum_reposition_delta_input | int(0) }}"
  minimum_action_interval_minutes: "{{ minimum_action_interval_minutes_input | int(0) }}"

  # --- Source availability guards ---
  has_awake_entity: "{{ awake_entity_input is string and awake_entity_input | length > 0 }}"
  has_awake_schedule: "{{ awake_schedule_input is string and awake_schedule_input | length > 0 }}"
  has_outdoor_temperature: "{{ outdoor_temperature_entity is string and outdoor_temperature_entity | length > 0 and has_value(outdoor_temperature_entity) }}"
  has_weather_entity: "{{ weather_entity is string and weather_entity | length > 0 and states(weather_entity) not in ['unknown', 'unavailable', ''] }}"
  has_indoor_temperature: "{{ indoor_temperature_entity is string and indoor_temperature_entity | length > 0 and has_value(indoor_temperature_entity) }}"
  has_wind_sensor: "{{ wind_speed_entity is string and wind_speed_entity | length > 0 and has_value(wind_speed_entity) }}"
  has_oriented_groups: >
    {{
      (north_cover_entities | count > 0)
      or (east_cover_entities | count > 0)
      or (south_cover_entities | count > 0)
      or (west_cover_entities | count > 0)
    }}

  # --- Presence and awake state ---
  is_home: >
    {{
      expand(presence_person_entities)
      | selectattr('state', 'eq', 'home')
      | list
      | count > 0
    }}
  is_daylight: "{{ is_state('sun.sun', 'above_horizon') }}"
  is_night: "{{ not is_daylight }}"
  is_awake: >
    {% if has_awake_entity %}
      {{ states(awake_entity_input) in ['on', 'home'] }}
    {% elif has_awake_schedule %}
      {{ is_state(awake_schedule_input, 'on') }}
    {% else %}
      {{ is_daylight }}
    {% endif %}

  # --- Sensor stability (values used only when stable long enough) ---
  outdoor_stable: >
    {{
      (not has_outdoor_temperature)
      or sensor_stability_minutes == 0
      or (as_timestamp(now()) - as_timestamp(states[outdoor_temperature_entity].last_updated)) >= (sensor_stability_minutes * 60)
    }}
  indoor_stable: >
    {{
      (not has_indoor_temperature)
      or sensor_stability_minutes == 0
      or (as_timestamp(now()) - as_timestamp(states[indoor_temperature_entity].last_updated)) >= (sensor_stability_minutes * 60)
    }}
  wind_stable: >
    {{
      (not has_wind_sensor)
      or sensor_stability_minutes == 0
      or (as_timestamp(now()) - as_timestamp(states[wind_speed_entity].last_updated)) >= (sensor_stability_minutes * 60)
    }}
  weather_stable: >
    {{
      (not has_weather_entity)
      or sensor_stability_minutes == 0
      or (as_timestamp(now()) - as_timestamp(states[weather_entity].last_updated)) >= (sensor_stability_minutes * 60)
    }}

  # --- Measured values ---
  temp_value: >
    {% if has_outdoor_temperature %}
      {{ states(outdoor_temperature_entity) | float(0) }}
    {% elif has_weather_entity %}
      {% set forecast = state_attr(weather_entity, 'forecast') %}
      {% if forecast is iterable and forecast is not string and forecast | count > 0 and forecast[0].temperature is defined %}
        {{ forecast[0].temperature | float(state_attr(weather_entity, 'temperature') | float(0)) }}
      {% else %}
        {{ state_attr(weather_entity, 'temperature') | float(0) }}
      {% endif %}
    {% else %}
      0
    {% endif %}
  indoor_temp_value: >
    {% if has_indoor_temperature %}
      {{ states(indoor_temperature_entity) | float(0) }}
    {% else %}
      0
    {% endif %}
  wind_value: >
    {% if has_wind_sensor %}
      {{ states(wind_speed_entity) | float(0) }}
    {% else %}
      0
    {% endif %}

  # --- Season ---
  is_summer: >
    {% if season_mode == 'summer' %}
      {{ true }}
    {% elif season_mode == 'winter' %}
      {{ false }}
    {% else %}
      {% set now_md = now().month * 100 + now().day %}
      {% set start_md = summer_start_month * 100 + summer_start_day %}
      {% set end_md = summer_end_month * 100 + summer_end_day %}
      {% if start_md <= end_md %}
        {{ now_md >= start_md and now_md <= end_md }}
      {% else %}
        {{ now_md >= start_md or now_md <= end_md }}
      {% endif %}
    {% endif %}

  # --- Thermal conditions (hysteresis around thresholds) ---
  wind_high: "{{ has_wind_sensor and wind_stable and (wind_value > max_wind_speed) }}"
  summer_hot: >
    {{
      is_summer
      and is_daylight
      and (
        (
          ((has_outdoor_temperature and outdoor_stable) or (has_weather_entity and weather_stable))
          and temp_value >= (summer_close_temp + temperature_hysteresis)
        )
        or
        (has_indoor_temperature and indoor_stable and indoor_temp_value >= (indoor_hot_temp + temperature_hysteresis))
      )
    }}
  summer_cool_enough: >
    {{
      is_summer
      and is_daylight
      and (
        (
          (not has_outdoor_temperature and not has_weather_entity)
          or temp_value <= (summer_close_temp - temperature_hysteresis)
        )
        and
        (
          (not has_indoor_temperature)
          or indoor_temp_value <= (indoor_hot_temp - temperature_hysteresis)
        )
      )
    }}
  winter_need_solar_gain: >
    {{
      (not is_summer)
      and is_daylight
      and (
        (has_indoor_temperature and indoor_stable and indoor_temp_value <= (winter_indoor_cold_temp - temperature_hysteresis))
        or
        (
          ((has_outdoor_temperature and outdoor_stable) or (has_weather_entity and weather_stable))
          and temp_value <= (winter_open_temp_below - temperature_hysteresis)
        )
      )
    }}

  # --- Sun-facing facade selection ---
  sun_azimuth: "{{ state_attr('sun.sun', 'azimuth') | float(0) }}"
  # A vertical facade is lit when the sun is within the configured half-angle of
  # its outward normal. Facade normals are derived from the real south facade
  # bearing (south_facade_azimuth) so a house rotated away from true north/south
  # is handled correctly: east = south - 90, west = south + 90, north = south +
  # 180. Several facades can be lit at once (for example east and south in the
  # morning), and every lit group contributes its covers. When no orientation
  # groups are configured the sun direction cannot be resolved per facade, so all
  # covers are treated as sun-facing.
  sun_facing_cover_entity_list: >
    {% if not has_oriented_groups %}
      {{ cover_entities }}
    {% else %}
      {% set az = sun_azimuth %}
      {% set h = facade_exposure_half_angle | float(75) %}
      {% set south_c = south_facade_azimuth | float(180) %}
      {% set north_c = (south_c + 180) % 360 %}
      {% set east_c = (south_c + 270) % 360 %}
      {% set west_c = (south_c + 90) % 360 %}
      {% set north_lit = (((az - north_c + 540) % 360) - 180) | abs <= h %}
      {% set east_lit = (((az - east_c + 540) % 360) - 180) | abs <= h %}
      {% set south_lit = (((az - south_c + 540) % 360) - 180) | abs <= h %}
      {% set west_lit = (((az - west_c + 540) % 360) - 180) | abs <= h %}
      {% set ns = namespace(ids=[]) %}
      {% if north_lit %}{% set ns.ids = ns.ids + north_cover_entities %}{% endif %}
      {% if east_lit %}{% set ns.ids = ns.ids + east_cover_entities %}{% endif %}
      {% if south_lit %}{% set ns.ids = ns.ids + south_cover_entities %}{% endif %}
      {% if west_lit %}{% set ns.ids = ns.ids + west_cover_entities %}{% endif %}
      {{ ns.ids | unique | list }}
    {% endif %}
  # Resolve the lit-facade covers against the managed cover list. When oriented
  # groups exist but none is currently lit, the result is intentionally empty so
  # nothing is shaded. There is no fallback to "shade every cover", which used to
  # force all covers to the sun-facing position whenever the sun pointed at a
  # facade that has no covers (e.g. east/west on a north-south house).
  active_sun_facing_cover_ids: >
    {% set base_ids = expand(sun_facing_cover_entity_list) | map(attribute='entity_id') | list %}
    {{ expand(cover_entities) | selectattr('entity_id', 'in', base_ids) | map(attribute='entity_id') | list }}

  # --- Per-cover contact opening ---
  contact_open_cover_ids: >
    {% set ns = namespace(ids=[]) %}
    {% for link in cover_contact_links %}
      {% set sensors = link.sensors if (link.sensors is defined and link.sensors is not none) else [] %}
      {% if link.cover is defined and link.cover and (expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0) %}
        {% set ns.ids = ns.ids + [link.cover] %}
      {% endif %}
    {% endfor %}
    {{ ns.ids | unique | list }}

  # --- Manual override and anti-wear locks (comfort only) ---
  manual_override_cover_ids: >
    {% if manual_override_minutes | int(0) <= 0 %}
      []
    {% else %}
      {% set ns = namespace(ids=[]) %}
      {% for cover in expand(cover_entities) %}
        {% set changed_recently = (as_timestamp(now()) - as_timestamp(cover.last_changed)) < (manual_override_minutes | int(0) * 60) %}
        {% if cover.attributes.current_position is defined and changed_recently and (cover.context is not none) and (cover.context.parent_id is none) %}
          {% set ns.ids = ns.ids + [cover.entity_id] %}
        {% endif %}
      {% endfor %}
      {{ ns.ids }}
    {% endif %}
  wear_lock_cover_ids: >
    {% if minimum_action_interval_minutes | int(0) <= 0 %}
      []
    {% else %}
      {% set ns = namespace(ids=[]) %}
      {% for cover in expand(cover_entities) %}
        {% set changed_recently = (as_timestamp(now()) - as_timestamp(cover.last_changed)) < (minimum_action_interval_minutes | int(0) * 60) %}
        {% if cover.attributes.current_position is defined and changed_recently %}
          {% set ns.ids = ns.ids + [cover.entity_id] %}
        {% endif %}
      {% endfor %}
      {{ ns.ids }}
    {% endif %}
  comfort_locked_cover_ids: >
    {{ (manual_override_cover_ids + wear_lock_cover_ids) | unique | list }}

  # --- Global mode (high-level decision) ---
  # away  : nobody home and Close When Away enabled
  # idle  : nobody home (no close), nothing else to do
  # wind  : high wind safety
  # night : sun below horizon
  # active: daytime, someone home (per-cover comfort/contact decided in the loop)
  cover_mode: >
    {% if not is_home %}
      {{ 'away' if close_when_away else 'idle' }}
    {% elif wind_high %}
      wind
    {% elif is_night %}
      night
    {% else %}
      active
    {% endif %}

  # --- Per-cover target position map (single source of truth) ---
  # A cover absent from the map is left untouched (no-op / hold).
  cover_targets: >
    {% set ns = namespace(map={}) %}
    {% for cover in expand(cover_entities) %}
      {% set cid = cover.entity_id %}
      {% set target = none %}
      {% if cover_mode == 'away' %}
        {% set target = 0 %}
      {% elif cover_mode == 'wind' %}
        {% set target = wind_position %}
      {% elif cid in contact_open_cover_ids %}
        {# An open door/window opens its own cover even at night, so the room
           stays usable (e.g. stepping out to the garden) without the night
           closing fighting the manual/contact action. Only away and wind, the
           true safety branches, still win over an open contact. #}
        {% set target = contact_open_position %}
      {% elif cover_mode == 'night' %}
        {% set target = night_position %}
      {% elif cover_mode == 'active' %}
        {% if not is_awake %}
          {% set target = none %}
        {% elif is_summer %}
          {% if summer_hot %}
            {# Follow the sun: shade only the sun-facing facade, keep the rest open. #}
            {% if cid in active_sun_facing_cover_ids %}
              {% set target = summer_sun_facing_position %}
            {% else %}
              {% set target = neutral_position %}
            {% endif %}
          {% elif summer_cool_enough %}
            {% set target = neutral_position %}
          {% else %}
            {% set target = none %}
          {% endif %}
        {% else %}
          {# Winter: open only the sun-facing facade for gains, insulate the rest. #}
          {% if winter_need_solar_gain and cid in active_sun_facing_cover_ids %}
            {% set target = winter_day_gain_position %}
          {% else %}
            {% set target = winter_day_hold_position %}
          {% endif %}
        {% endif %}
      {% endif %}
      {% if target is not none %}
        {% set ns.map = dict(ns.map, **{cid: target}) %}
      {% endif %}
    {% endfor %}
    {{ ns.map }}

action:
  - repeat:
      for_each: "{{ cover_targets | dictsort }}"
      sequence:
        - variables:
            cover_id: "{{ repeat.item[0] }}"
            target_position: "{{ repeat.item[1] | int }}"
            current_position: "{{ state_attr(repeat.item[0], 'current_position') }}"
            # Only true safety (away/wind) and contact opening bypass comfort
            # filtering. Contact opening is forced in any mode (including night)
            # so an open door/window reopens its cover immediately. Plain night
            # closing still respects manual override, so an evening manual open
            # is not reverted before the override window expires.
            forced_move: >
              {{
                cover_mode in ['away', 'wind']
                or repeat.item[0] in contact_open_cover_ids
              }}
        - condition: template
          value_template: >
            {{
              current_position is not none
              and (current_position | int - target_position) | abs
                  >= (0 if forced_move else minimum_reposition_delta | int(0))
              and (forced_move or cover_id not in comfort_locked_cover_ids)
            }}
        - service: cover.set_cover_position
          target:
            entity_id: "{{ cover_id }}"
          data:
            position: "{{ target_position }}"
