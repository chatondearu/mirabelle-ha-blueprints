blueprint:
  homeassistant:
    min_version: 2025.5.3
  name: "[CDA] 🛋️ Create Living Area Lighting Helpers"
  description: >
    Create input_select and input_boolean dashboard helpers for Living Area
    Adaptive Lighting. Writes a package file and reloads Home Assistant core
    configuration. Requires the shell_command documented in
    docs/living-area-adaptive-lighting.md.
  domain: script
  source_url: https://github.com/chatondearu/mirabelle-ha-blueprints/blob/main/blueprints/scripts/create-living-area-lighting-helpers.yaml
  input:
    helper_slug:
      name: Helper Slug
      description: >
        Base slug used for helper entity ids: input_select.{slug}_mode and
        input_boolean.{slug}_hold.
      default: living_area_lighting
      selector:
        text: {}
    mode_helper_name:
      name: Mode Helper Name
      description: Friendly name for the mode input_select helper.
      default: Living Area Lighting Mode
      selector:
        text: {}
    hold_helper_name:
      name: Hold Helper Name
      description: Friendly name for the hold input_boolean helper.
      default: Living Area Lighting Hold
      selector:
        text: {}
    package_filename:
      name: Package Filename
      description: >
        Filename written under /config/packages/. Leave default unless you run
        multiple instances with different slugs.
      default: cda_living_area_lighting_helpers.yaml
      selector:
        text: {}

script:
  mode: single
  sequence:
    - variables:
        helper_slug_value: !input helper_slug
        mode_helper_name_value: !input mode_helper_name
        hold_helper_name_value: !input hold_helper_name
        package_filename_value: !input package_filename
        slug: >
          {{ helper_slug_value
             | regex_replace('[^a-zA-Z0-9_]+', '_')
             | lower
             | regex_replace('^_+|_+$', '') }}
        mode_entity: "input_select.{{ slug }}_mode"
        hold_entity: "input_boolean.{{ slug }}_hold"
        mode_exists: "{{ states(mode_entity) not in ['unknown', 'unavailable', ''] }}"
        hold_exists: "{{ states(hold_entity) not in ['unknown', 'unavailable', ''] }}"
        package_filename_resolved: "{{ package_filename_value }}"
        package_b64: >
          {% set pkg -%}
          # Generated by [CDA] Living Area Lighting helper setup
          input_select:
            {{ slug }}_mode:
              name: {{ mode_helper_name_value }}
              options:
                - auto
                - day
                - night
                - off
              initial: auto
              icon: mdi:lightbulb-auto
          input_boolean:
            {{ slug }}_hold:
              name: {{ hold_helper_name_value }}
              initial: false
              icon: mdi:hand-back-right-off
          {%- endset %}
          {{ pkg | b64encode }}
    - if:
        - condition: template
          value_template: "{{ mode_exists and hold_exists }}"
      then:
        - stop: Living area lighting helpers already exist
      else:
        - service: shell_command.cda_write_living_area_lighting_helper_package
          data:
            package_filename: "{{ package_filename_resolved | string }}"
            content_b64: "{{ package_b64 | string }}"
          continue_on_error: true
        - service: homeassistant.reload_core_config
          continue_on_error: true
        - delay:
            seconds: 5
        - variables:
            mode_exists_after: "{{ states(mode_entity) not in ['unknown', 'unavailable', ''] }}"
            hold_exists_after: "{{ states(hold_entity) not in ['unknown', 'unavailable', ''] }}"
        - if:
            - condition: template
              value_template: "{{ mode_exists_after and hold_exists_after }}"
          then:
            - service: persistent_notification.create
              data:
                title: "[CDA] Living Area Lighting Helpers"
                message: >
                  Created {{ mode_entity }} and {{ hold_entity }}.
                  Add them to your dashboard if needed.
          else:
            - service: persistent_notification.create
              data:
                title: "[CDA] Living Area Lighting Helpers"
                message: >
                  Automatic helper creation failed. Add shell_command
                  cda_write_living_area_lighting_helper_package to configuration.yaml
                  (see docs/living-area-adaptive-lighting.md), or create helpers manually:
                  {{ mode_entity }} (options: auto, day, night, off) and {{ hold_entity }}.
